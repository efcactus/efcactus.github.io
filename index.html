<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EF Cactus Consulting</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;

            justify-content: center; 
            height: 90vh; 
            margin: 0; 
            color: #1a1a1a; 
            background-color: #fff;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        h1 { 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
        }
        .divider {
            width: 40px;
            height: 4px;
            background-color: #1a1a1a;
            margin: 30px auto;
        }
        .lead {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            color: #000;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 400;
            border-bottom: 1px solid #ccc;
            padding-bottom: 2px;
            font-size: 1.1rem;
        }
        a:hover {
            border-bottom-color: #1a1a1a;
        }

    <div class="container">
        <h1>EF Cactus</h1>
        <div class="divider"></div>
        
        <span class="lead">Marious Stylianou</span>
